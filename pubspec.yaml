name: ftp_photo_server
description: FTP Photo Server - iOS app to receive photos via FTP and save to Camera Roll.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  photo_manager: ^3.0.0
  permission_handler: ^11.3.0
  path_provider: ^2.1.2
  network_info_plus: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
